# Default config for the agent-faithfulness pipeline.

seed: 42

# --- Catalog ---
catalog_size: 200

# --- Queries ---
n_constraints: 3

# --- Tool ---
k: 5

# --- Agent loop ---
model: "Qwen/Qwen2.5-7B-Instruct"
dtype: "bfloat16"
max_steps: 5

# --- Corpus generation ---
n_trajectories: 250
# Distribution across perturbation levels. Yields 50 / 100 / 100 at n=250.
level_distribution:
  0: 0.20
  1: 0.40
  2: 0.40

# --- Activation capture ---
capture_activations: true
activation_dtype: "bfloat16"

# --- Output ---
out_dir: "data"
trajectories_filename: "trajectories.jsonl"
catalog_filename: "catalog.json"
activations_subdir: "activations"
